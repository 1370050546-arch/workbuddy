<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>上班赚钱搭子</title>
<style>
:root {
  --bg: #0a0a14;
  --gold: #f0c060;
  --gold-bright: #ffd700;
  --gold-soft: #c9a040;
  --text: #e8e8ec;
  --text-dim: #8888a0;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
}

/* Themes */
body.theme-gold {
  --bg: #0a0a14;
  --gold: #f0c060; --gold-bright: #ffd700; --gold-soft: #c9a040;
  --text: #e8e8ec; --text-dim: #8888a0;
  --card-bg: rgba(255,255,255,0.04); --card-border: rgba(255,255,255,0.08);
  --green: #4ade80; --red: #f87171; --blue: #60a5fa;
}
body.theme-ocean {
  --bg: #0a1628;
  --gold: #5ec8e0; --gold-bright: #7dd8f0; --gold-soft: #3aa8c0;
  --text: #e0e8f0; --text-dim: #7a8ea8;
  --card-bg: rgba(100,200,255,0.04); --card-border: rgba(100,200,255,0.1);
  --green: #4ade80; --red: #f87171; --blue: #60a5fa;
}
body.theme-forest {
  --bg: #0a140f;
  --gold: #6ee0a0; --gold-bright: #8ff0b8; --gold-soft: #4ab878;
  --text: #e0ece4; --text-dim: #7a9a82;
  --card-bg: rgba(100,255,160,0.04); --card-border: rgba(100,255,160,0.08);
  --green: #4ade80; --red: #f87171; --blue: #60a5fa;
}
body.theme-rose {
  --bg: #140a10;
  --gold: #f0a0b8; --gold-bright: #ffb8cc; --gold-soft: #d07890;
  --text: #f0e0e8; --text-dim: #a08898;
  --card-bg: rgba(255,150,180,0.04); --card-border: rgba(255,150,180,0.08);
  --green: #4ade80; --red: #f87171; --blue: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", "Roboto", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  touch-action: manipulation;
  user-select: none;
}

canvas#particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Mascot + Status */
.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
}
.status-emoji {
  font-size: 36px;
  line-height: 1;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.status-text {
  font-size: 15px;
  color: var(--text-dim);
  font-weight: 500;
}

/* Slogan */
.slogan {
  text-align: center;
  font-size: 13px;
  color: var(--gold-soft);
  letter-spacing: 0.15em;
  font-weight: 500;
  opacity: 0.7;
}
.slogan-sub {
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
  opacity: 0.6;
  transition: all 0.5s;
}

/* Clock */
.clock {
  text-align: center;
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
}

/* Earnings Card */
.earnings-card {
  text-align: center;
  padding: 32px 20px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}
.earnings-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at center, rgba(240,192,96,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.earnings-label {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.earnings-amount {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(240,192,96,0.3), 0 0 80px rgba(240,192,96,0.1);
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: text-shadow 0.5s;
}
.earnings-amount .digit {
  font-size: 44px;
  font-weight: 700;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
}
.earnings-amount .sep {
  font-size: 36px;
  font-weight: 500;
  opacity: 0.4;
  margin: 0 1px;
  color: var(--gold);
}
.earnings-amount.pulse {
  text-shadow: 0 0 60px rgba(255,215,0,0.5), 0 0 120px rgba(240,192,96,0.2);
}

/* Progress */
.progress-section {
  padding: 0 4px;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-dim);
}
.progress-bar {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-soft), var(--gold-bright), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 16px; height: 100%;
  background: var(--gold-bright);
  border-radius: 3px;
  filter: blur(4px);
}

/* Info row */
.info-row {
  display: flex;
  gap: 2px;
  font-size: 12px;
  color: var(--text-dim);
  justify-content: center;
  flex-wrap: wrap;
}
.info-row span {
  background: rgba(255,255,255,0.04);
  padding: 4px 10px;
  border-radius: 10px;
}

/* Monthly Card */
.monthly-card {
  padding: 20px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.monthly-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.monthly-title {
  font-size: 14px;
  color: var(--text-dim);
}
.monthly-amount {
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
}
.monthly-stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.stat-chip {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
}
.stat-chip strong {
  color: var(--text);
  font-weight: 600;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--card-border);
  border-radius: 14px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  transition: all 0.2s;
  text-align: center;
  font-family: inherit;
}
.btn:active {
  background: rgba(255,255,255,0.1);
  transform: scale(0.97);
}
.btn.primary {
  background: linear-gradient(135deg, rgba(240,192,96,0.2), rgba(240,192,96,0.1));
  border-color: rgba(240,192,96,0.3);
  color: var(--gold);
  font-weight: 600;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  width: 100%;
  max-width: 420px;
  max-height: 80vh;
  background: #181825;
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 32px;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal h3 {
  font-size: 18px;
  margin-bottom: 20px;
  text-align: center;
  font-weight: 600;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.form-row {
  display: flex;
  gap: 10px;
}
.form-row .form-group { flex:1; }
input[type="time"],
input[type="number"],
input[type="date"] {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--gold-soft); }
input[type="time"]::-webkit-calendar-picker-indicator,
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.8);
}

/* Calendar */
.calendar-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.calendar-nav button {
  width: 32px; height: 32px;
  border: 1px solid var(--card-border);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.calendar-nav button:active { background: rgba(255,255,255,0.1); }
.calendar-month {
  font-size: 16px;
  font-weight: 600;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  text-align: center;
}
.calendar-header-cell {
  font-size: 12px;
  color: var(--text-dim);
  padding: 6px 0;
  font-weight: 500;
}
.calendar-header-cell.weekend { color: rgba(248,113,113,0.45); }
.calendar-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  font-variant-numeric: tabular-nums;
  background: transparent;
  color: var(--text);
  position: relative;
}
.calendar-day:active { transform: scale(0.92); }
.calendar-day.weekend {
  color: rgba(255,255,255,0.18);
  cursor: default;
  pointer-events: none;
}
.calendar-day.leave {
  background: rgba(248,113,113,0.2);
  color: var(--red);
  font-weight: 600;
}
.calendar-day.rest {
  background: rgba(96,165,250,0.2);
  color: var(--blue);
  font-weight: 600;
}
.calendar-day.workday:hover {
  background: rgba(255,255,255,0.06);
}
.calendar-day.today {
  box-shadow: inset 0 0 0 2px var(--gold-soft);
}
.calendar-day.empty {
  pointer-events: none;
}
.calendar-legend {
  display: flex;
  gap: 18px;
  justify-content: center;
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-dim);
}
.calendar-legend span {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}
.legend-dot.work { background: rgba(255,255,255,0.08); border: 1px solid var(--card-border); }
.legend-dot.leave { background: rgba(248,113,113,0.3); }
.legend-dot.rest { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #181825;
  border: 1px solid var(--card-border);
  padding: 10px 20px;
  border-radius: 14px;
  font-size: 13px;
  color: var(--text);
  z-index: 200;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(-10px); } }

/* Radio & Checkbox groups */
.radio-group, .checkbox-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.radio-opt, .check-opt {
  padding: 8px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-dim);
  user-select: none;
}
.radio-opt.active, .check-opt.active {
  background: rgba(240,192,96,0.15);
  border-color: var(--gold-soft);
  color: var(--gold);
  font-weight: 600;
}
.settings-section {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--card-border);
}
.settings-section-title {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

/* Responsive */
@media (max-width: 400px) {
  .earnings-amount .digit { font-size: 36px; }
  .container { padding: 16px 14px; gap: 14px; }
}
@media (min-width: 768px) {
  .modal-overlay { align-items: center; }
  .modal { border-radius: 24px; max-height: 70vh; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>


<div class="container">
  <!-- Status -->
  <div class="status-bar">
    <div class="status-emoji" id="statusEmoji">💰</div>
    <div class="status-text" id="statusText">加载中...</div>
  </div>

  <!-- Slogan -->
  <div class="slogan">⚡ 把电充满，把尿喝淡 ⚡</div>
  <div class="slogan-sub" id="sloganSub">☀️ 又是活力满满的一天呢！</div>

  <!-- Clock -->
  <div class="clock" id="clock">00:00:00</div>

  <!-- Earnings -->
  <div class="earnings-card">
    <div class="earnings-label">今日已赚</div>
    <div class="earnings-amount" id="earningsAmount">
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-header">
      <span id="progressLabel">今日进度</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Today info -->
  <div class="info-row" id="todayInfo"></div>

  <!-- Monthly -->
  <div class="monthly-card">
    <div class="monthly-header">
      <span class="monthly-title" id="monthlyTitle">本月已赚</span>
    </div>
    <div class="monthly-amount" id="monthlyAmount">¥0</div>
    <div class="monthly-stats" id="monthlyStats"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn" onclick="openSettings()">⚙️ 设置</button>
    <button class="btn" onclick="openLeave()">📅 请假</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h3>⚙️ 工作设置</h3>
    <div class="form-row">
      <div class="form-group">
        <label>上班时间</label>
        <input type="time" id="setStart">
      </div>
      <div class="form-group">
        <label>下班时间</label>
        <input type="time" id="setEnd">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>午休开始</label>
        <input type="time" id="setLunchStart">
      </div>
      <div class="form-group">
        <label>午休结束</label>
        <input type="time" id="setLunchEnd">
      </div>
    </div>
    <div class="form-group">
      <label>每日薪资（元）</label>
      <input type="number" id="setSalary" min="1" step="1" placeholder="800">
    </div>

    <!-- Rest day config -->
    <div class="settings-section">
      <div class="settings-section-title">每周休息日</div>
      <div class="radio-group" id="restModeGroup">
        <span class="radio-opt active" data-val="double" onclick="selectRestMode('double',this)">双休</span>
        <span class="radio-opt" data-val="single" onclick="selectRestMode('single',this)">单休</span>
        <span class="radio-opt" data-val="custom" onclick="selectRestMode('custom',this)">自定义</span>
        <span class="radio-opt" data-val="fixed" onclick="selectRestMode('fixed',this)">每月固休</span>
      </div>
      <div id="customRestRow" style="display:none;margin-top:10px">
        <label style="font-size:12px;color:var(--text-dim);margin-bottom:6px;display:block">勾选为休息日</label>
        <div class="checkbox-row" id="customRestChecks"></div>
      </div>
      <div id="fixedRestRow" style="display:none;margin-top:10px">
        <label style="font-size:12px;color:var(--text-dim)">每月固定休息天数</label>
        <input type="number" id="setFixedRest" min="1" max="15" step="1" value="4" style="margin-top:4px">
      </div>
    </div>

    <!-- Full attendance -->
    <div class="settings-section">
      <div class="settings-section-title">满勤奖（可选）</div>
      <div class="form-row">
        <div class="form-group">
          <label>满勤要求天数</label>
          <input type="number" id="setFullDays" min="0" step="1" placeholder="留空则不启用">
        </div>
        <div class="form-group">
          <label>满勤补贴（元）</label>
          <input type="number" id="setFullBonus" min="0" step="1" placeholder="留空则不启用">
        </div>
      </div>
    </div>

    <!-- Theme -->
    <div class="settings-section">
      <div class="settings-section-title">网页主题</div>
      <div class="radio-group" id="themeGroup">
        <span class="radio-opt active" data-val="gold" onclick="selectTheme('gold',this)">🌙 暗夜金</span>
        <span class="radio-opt" data-val="ocean" onclick="selectTheme('ocean',this)">🌊 深海蓝</span>
        <span class="radio-opt" data-val="forest" onclick="selectTheme('forest',this)">🌿 森林绿</span>
        <span class="radio-opt" data-val="rose" onclick="selectTheme('rose',this)">🌸 樱花粉</span>
      </div>
    </div>


    <div class="btn-row" style="margin-top:20px">
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- Leave Modal -->
<div class="modal-overlay" id="leaveModal" style="display:none" onclick="if(event.target===this)closeLeaveCal()">
  <div class="modal">
    <h3>📅 请假管理</h3>

    <div class="calendar-nav">
      <button onclick="changeCalMonth(-1)">◀</button>
      <span class="calendar-month" id="calMonthLabel">6月 2026</span>
      <button onclick="changeCalMonth(1)">▶</button>
    </div>

    <div class="calendar-grid" id="calGrid"></div>

    <div class="calendar-legend">
      <span><span class="legend-dot work"></span>上班</span>
      <span><span class="legend-dot leave"></span>请假</span>
      <span><span class="legend-dot rest"></span>休息</span>
    </div>

    <div class="btn-row" style="margin-top:18px">
      <button class="btn" onclick="closeLeaveCal()">取消</button>
      <button class="btn primary" onclick="saveLeaveCal()">确定</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<script>
// Global error boundary - prevent blank page on Android
window.onerror = function(msg) { console.error('Page error:', msg); return true; };

// ─── Settings ──────────────────────────────
const DEFAULT = {
  startTime: '09:00',
  endTime: '18:00',
  lunchStart: '12:00',
  lunchEnd: '13:00',
  dailySalary: 800,
  restMode: 'double',        // 'double'|'single'|'custom'|'fixed'
  customRestDays: [],        // for custom: day indices (0=Sun..6=Sat)
  fixedRestDays: 4,          // for fixed mode
  fullAttendDays: 0,         // 0=disabled
  fullAttendBonus: 0,        // 0=disabled
  theme: 'gold',              // 'gold'|'ocean'|'forest'|'rose'
};

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('workBuddySettings'));
    if (s && s.dailySalary > 0) return { ...DEFAULT, ...s };
  } catch(e) {}
  return { ...DEFAULT };
}

function saveToLocal(settings) {
  localStorage.setItem('workBuddySettings', JSON.stringify(settings));
}

function loadLeaveDays() {
  try {
    const arr = JSON.parse(localStorage.getItem('workBuddyLeaveDays'));
    if (Array.isArray(arr)) return arr;
  } catch(e) {}
  return [];
}

function saveLeaveDays(arr) {
  localStorage.setItem('workBuddyLeaveDays', JSON.stringify(arr));
}

function loadRestDays() {
  try {
    const arr = JSON.parse(localStorage.getItem('workBuddyRestDays'));
    if (Array.isArray(arr)) return arr;
  } catch(e) {}
  return [];
}

function saveRestDays(arr) {
  localStorage.setItem('workBuddyRestDays', JSON.stringify(arr));
}

let settings = loadSettings();
let leaveDays = loadLeaveDays();
let allocatedRestDays = loadRestDays(); // for fixed rest mode

function getRestDaySet() {
  switch (settings.restMode) {
    case 'double': return new Set([0, 6]);        // Sun, Sat
    case 'single': return new Set([0]);            // Sun
    case 'custom': return new Set(settings.customRestDays);
    case 'fixed':  return new Set();               // no fixed weekly rest
    default:       return new Set([0, 6]);
  }
}

// ─── Date Helpers ──────────────────────────
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function timeToMin(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60 + m;
}

function isWeekday(date) {
  const restSet = getRestDaySet();
  return !restSet.has(date.getDay());
}

function isRestDay(dateStr) {
  // In fixed mode, check if this date is an allocated rest day
  if (settings.restMode === 'fixed') {
    return allocatedRestDays.includes(dateStr);
  }
  return false;
}

// ─── Earnings Calculation ──────────────────
function calcToday() {
  const now = new Date();
  const day = now.getDay();
  const today = todayStr();

  // Weekend
  if (!isWeekday(now)) {
    return { earned: 0, isWorking: false, reason: 'weekend', progress: 0 };
  }
  // Leave day
  if (leaveDays.includes(today)) {
    return { earned: 0, isWorking: false, reason: 'leave', progress: 0 };
  }
  // Allocated rest day (fixed mode)
  if (isRestDay(today)) {
    return { earned: 0, isWorking: false, reason: 'leave', progress: 0 };
  }

  const startMin = timeToMin(settings.startTime);
  const endMin = timeToMin(settings.endTime);
  const lunchStartMin = timeToMin(settings.lunchStart);
  const lunchEndMin = timeToMin(settings.lunchEnd);
  const lunchDur = lunchEndMin - lunchStartMin;
  const totalWorkMin = (endMin - startMin) - lunchDur;

  if (totalWorkMin <= 0) return { earned: 0, isWorking: false, reason: 'invalid', progress: 0 };

  const nowMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;

  if (nowMin < startMin) {
    return { earned: 0, isWorking: false, reason: 'before_work', progress: 0 };
  }
  if (nowMin >= endMin) {
    return { earned: settings.dailySalary, isWorking: false, reason: 'after_work', progress: 1 };
  }

  let workedMin = nowMin - startMin;
  // During lunch
  if (nowMin > lunchStartMin) {
    if (nowMin >= lunchEndMin) {
      workedMin -= lunchDur;
    } else {
      workedMin = lunchStartMin - startMin; // freeze at pre-lunch
      return {
        earned: (workedMin / totalWorkMin) * settings.dailySalary,
        isWorking: false,
        reason: 'during_lunch',
        progress: workedMin / totalWorkMin,
      };
    }
  }

  const progress = Math.min(workedMin / totalWorkMin, 1);
  return {
    earned: progress * settings.dailySalary,
    isWorking: true,
    reason: 'working',
    progress,
  };
}

function countPastWorkdays() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const today = now.getDate();
  let count = 0;
  for (let d = 1; d < today; d++) {
    const dt = new Date(y, m, d);
    if (!isWeekday(dt)) continue;
    const ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    if (leaveDays.includes(ds)) continue;
    if (isRestDay(ds)) continue;
    count++;
  }
  return count;
}

function countMonthWorkdays() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const lastDay = new Date(y, m+1, 0).getDate();
  let count = 0;
  for (let d = 1; d <= lastDay; d++) {
    if (isWeekday(new Date(y, m, d))) count++;
  }
  if (settings.restMode === 'fixed') {
    count = lastDay - settings.fixedRestDays;
  }
  return count;
}

// ─── Status Message ────────────────────────
function getStatus(reason, progress) {
  const map = {
    weekend:       { e:'🏖️', t:'周末愉快，好好休息～' },
    leave:         { e:'🌴', t:'请假休息，放空自己～' },
    before_work:   { e:'🌅', t:'准备开启赚钱的一天！' },
    after_work:    { e:'🎉', t:'下班！今天辛苦啦～' },
    during_lunch:  { e:'🍜', t:'午休中，好好吃饭～' },
    invalid:       { e:'⚠️', t:'工作时间设置有误，去改改吧～' },
  };
  if (map[reason]) return map[reason];
  if (progress < 0.25) return { e:'☀️', t:'早上好，元气满满！' };
  if (progress < 0.5)  return { e:'💪', t:'渐入佳境，继续冲！' };
  if (progress < 0.75) return { e:'☕', t:'下午加油，钱在向你招手～' };
  if (progress < 0.9)  return { e:'🏁', t:'快下班了，冲刺！' };
  return { e:'💰', t:'认真赚钱中...' };
}

function getSlogan(reason, progress) {
  if (reason === 'before_work') return '🕘 还没到上班时间呢～';
  if (reason === 'after_work') return '🎉 下班！今天辛苦啦～';
  if (reason === 'weekend') return '🏖️ 周末了，忘了工作吧～';
  if (progress >= 0.7) return '屁股快坐不住了，马上就能跑路了！🏃‍♂️💨';
  if (progress < 0.25) return '☀️ 又是活力满满的一天呢！';
  return '💪 认真搬砖中，钱在向你招手～';
}

// ─── Particles ─────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas ? canvas.getContext('2d') : null;
let particles = [];
let W, H;
let particlesEnabled = !!ctx;

function resizeCanvas() {
  if (!particlesEnabled) return;
  try {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  } catch(e) { particlesEnabled = false; }
}
window.addEventListener('resize', resizeCanvas);
if (particlesEnabled) resizeCanvas();

class Particle {
  constructor() {
    this.reset(true);
  }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.size = Math.random() * 2.5 + 1;
    this.speedY = -(Math.random() * 0.6 + 0.2);
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.opacity = Math.random() * 0.4 + 0.15;
    this.life = 1;
    this.decay = Math.random() * 0.002 + 0.0015;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life -= this.decay;
    if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > W + 10) {
      this.reset(false);
    }
  }
  draw() {
    const alpha = this.opacity * this.life;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240,192,96,${alpha})`;
    ctx.fill();
  }
}

// Init particles
if (particlesEnabled) {
  try {
    for (let i = 0; i < 40; i++) particles.push(new Particle());
  } catch(e) { particlesEnabled = false; }
}

function updateParticles() {
  if (!particlesEnabled) return;
  try {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.update();
      p.draw();
    }
  } catch(e) { particlesEnabled = false; }
}

// ─── Earnings Display Renderer ───────────────
function renderEarnings(text) {
  const container = document.getElementById('earningsAmount');
  let html = '';
  for (const ch of text) {
    if (ch === ',' || ch === '.' || ch === '¥') {
      html += `<span class="sep">${ch}</span>`;
    } else {
      html += `<span class="digit">${ch}</span>`;
    }
  }
  container.innerHTML = html;
}

// ─── UI Update ─────────────────────────────
let displayValue = 0;

function updateUI() {
  try {
  const now = new Date();

  // Clock
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('zh-CN', { hour12: false });

  // Today calc
  const t = calcToday();

  // Smoothed display value
  if (!t.isWorking && t.reason !== 'working') {
    displayValue = t.earned;
  } else {
    const speed = 0.08;
    displayValue += (t.earned - displayValue) * speed;
    // Snap if very close
    if (Math.abs(t.earned - displayValue) < 0.001) displayValue = t.earned;
  }

  const formatted = '¥' + Math.round(displayValue).toLocaleString() + (displayValue % 1).toFixed(2).substring(1);
  renderEarnings(formatted);

  // Pulse effect when working
  const amountEl = document.getElementById('earningsAmount');
  if (t.isWorking) {
    amountEl.classList.add('pulse');
  } else {
    amountEl.classList.remove('pulse');
  }

  // Progress bar
  const pct = Math.round(t.progress * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = t.isWorking ? '今日进度' :
    t.reason === 'after_work' ? '已完成' :
    t.reason === 'during_lunch' ? '午休中' : '今日进度';

  // Status
  const st = getStatus(t.reason, t.progress);
  document.getElementById('statusEmoji').textContent = st.e;
  document.getElementById('statusText').textContent = st.t;

  // Dynamic slogan
  document.getElementById('sloganSub').textContent = getSlogan(t.reason, t.progress);

  // Today info
  const infoEl = document.getElementById('todayInfo');
  infoEl.innerHTML =
    `<span>🕘 ${settings.startTime}-${settings.endTime}</span>` +
    `<span>🍜 ${settings.lunchStart}-${settings.lunchEnd}</span>` +
    `<span>💵 ¥${settings.dailySalary}/天</span>`;

  // Monthly
  const pastDays = countPastWorkdays();
  const today = todayStr();
  const isTodayWorking = isWeekday(now) && !leaveDays.includes(today) && !isRestDay(today);
  const todayEarned = isTodayWorking ? Math.min(displayValue, settings.dailySalary) : 0;
  const monthEarned = pastDays * settings.dailySalary + todayEarned;
  const totalWorkdays = countMonthWorkdays();
  const leaveCount = leaveDays.filter(d => {
    const dt = new Date(d);
    return dt.getFullYear() === now.getFullYear() && dt.getMonth() === now.getMonth();
  }).length;
  const restCount = settings.restMode === 'fixed'
    ? allocatedRestDays.filter(d => {
        const dt = new Date(d);
        return dt.getFullYear() === now.getFullYear() && dt.getMonth() === now.getMonth();
      }).length
    : 0;
  const actualWorkDays = pastDays + (isTodayWorking ? 1 : 0);

  // Full attendance bonus
  let bonusHTML = '';
  let totalEarned = monthEarned;
  if (settings.fullAttendDays > 0 && settings.fullAttendBonus > 0) {
    const actualLeave = settings.restMode === 'fixed'
      ? leaveCount + Math.max(0, restCount - settings.fixedRestDays)
      : leaveCount;
    const projected = totalWorkdays - actualLeave - (settings.restMode === 'fixed' ? settings.fixedRestDays - restCount : 0);
    const eligible = actualWorkDays >= settings.fullAttendDays;
    if (eligible) totalEarned += settings.fullAttendBonus;
    bonusHTML = `<span class="stat-chip" style="color:${eligible ? 'var(--green)' : 'var(--text-dim)'}">满勤 ${actualWorkDays}/${settings.fullAttendDays} ${eligible ? '✅ +¥'+settings.fullAttendBonus : ''}</span>`;
  }

  const projectedFull = (totalWorkdays - leaveCount - (settings.restMode === 'fixed' ? settings.fixedRestDays : 0)) * settings.dailySalary
    + (settings.fullAttendBonus > 0 && settings.fullAttendDays > 0 ? settings.fullAttendBonus : 0);

  document.getElementById('monthlyAmount').textContent = '¥' + Math.round(totalEarned).toLocaleString();
  document.getElementById('monthlyStats').innerHTML =
    `<span class="stat-chip">应出勤 <strong>${totalWorkdays}</strong> 天</span>` +
    `<span class="stat-chip">已出勤 <strong>${actualWorkDays}</strong> 天</span>` +
    (leaveCount > 0 ? `<span class="stat-chip">请假 <strong>${leaveCount}</strong> 天</span>` : '') +
    (settings.restMode === 'fixed' ? `<span class="stat-chip">休息 <strong>${restCount}/${settings.fixedRestDays}</strong> 天</span>` : '') +
    bonusHTML +
    `<span class="stat-chip">预计本月 <strong>¥${projectedFull.toLocaleString()}</strong></span>`;

  const monthName = now.getMonth() + 1;
  document.getElementById('monthlyTitle').textContent = `${monthName}月已赚`;
  } catch(e) { console.error('updateUI error:', e); }
}

// ─── Animation Loop ────────────────────────
function loop() {
  try { updateUI(); } catch(e) {}
  try { updateParticles(); } catch(e) {}
  requestAnimationFrame(loop);
}

// ─── Settings Modal ────────────────────────
let tempRestMode = 'double';

let tempTheme = 'gold';

const WEEKDAY_LABELS = ['日','一','二','三','四','五','六'];

function openSettings() {

}

function selectRestMode(mode, el) {

  updateRestModeUI();
}

function updateRestModeUI() {
  document.querySelectorAll('#restModeGroup .radio-opt').forEach(o => o.classList.remove('active'));
  document.querySelector(`#restModeGroup .radio-opt[data-val="${tempRestMode}"]`)?.classList.add('active');
  document.getElementById('customRestRow').style.display = tempRestMode === 'custom' ? 'block' : 'none';
  document.getElementById('fixedRestRow').style.display = tempRestMode === 'fixed' ? 'block' : 'none';
  if (tempRestMode === 'custom') updateCustomChecks();
}

function updateCustomChecks() {
  const row = document.getElementById('customRestChecks');
  row.innerHTML = WEEKDAY_LABELS.map((l, i) => {
    const active = tempCustomRest.includes(i);
    return `<span class="check-opt${active ? ' active' : ''}" data-idx="${i}" onclick="toggleCustomRest(${i},this)">周${l}</span>`;
  }).join('');
}

function toggleCustomRest(idx, el) {
  if (tempCustomRest.includes(idx)) {
    tempCustomRest = tempCustomRest.filter(i => i !== idx);
    el.classList.remove('active');
  } else {
    tempCustomRest.push(idx);
    el.classList.add('active');
  }
}

function selectTheme(theme, el) {
  tempTheme = theme;
  updateThemeUI();
}

function updateThemeUI() {
  document.querySelectorAll('#themeGroup .radio-opt').forEach(o => o.classList.remove('active'));
  document.querySelector(`#themeGroup .radio-opt[data-val="${tempTheme}"]`)?.classList.add('active');
}

function applyTheme(theme) {
  document.body.className = document.body.className.replace(/theme-\w+/g, '');
  if (theme !== 'gold') document.body.classList.add('theme-' + theme);
}

function saveSettings() {
  const startTime = document.getElementById('setStart').value;
  const endTime = document.getElementById('setEnd').value;
  const lunchStart = document.getElementById('setLunchStart').value;
  const lunchEnd = document.getElementById('setLunchEnd').value;
  const dailySalary = parseInt(document.getElementById('setSalary').value, 10);

  if (!startTime || !endTime || !lunchStart || !lunchEnd) {
    showToast('请填写所有时间字段');
    return;
  }
  if (!dailySalary || dailySalary <= 0) {
    showToast('请填写有效的日薪');
    return;
  }
  if (timeToMin(endTime) <= timeToMin(startTime)) {
    showToast('下班时间必须晚于上班时间');
    return;
  }
  if (timeToMin(lunchEnd) <= timeToMin(lunchStart)) {
    showToast('午休结束必须晚于开始');
    return;
  }
  if (timeToMin(lunchStart) < timeToMin(startTime) || timeToMin(lunchEnd) > timeToMin(endTime)) {
    showToast('午休时间需在上班时间内');
    return;
  }

  const fixedRestDays = parseInt(document.getElementById('setFixedRest').value, 10) || 4;
  const fullAttendDays = parseInt(document.getElementById('setFullDays').value, 10) || 0;
  const fullAttendBonus = parseInt(document.getElementById('setFullBonus').value, 10) || 0;

  settings = {
    startTime, endTime, lunchStart, lunchEnd, dailySalary,
    restMode: tempRestMode,
    customRestDays: tempRestMode === 'custom' ? [...tempCustomRest] : [],
    fixedRestDays,
    fullAttendDays,
    fullAttendBonus,
    theme: tempTheme,
  };
  saveToLocal(settings);
  applyTheme(tempTheme);
  displayValue = calcToday().earned;
  closeSettings();
  showToast('设置已保存 ✅');
}

// ─── Leave Modal (Calendar) ────────────────
let pendingLeave = [];
let pendingRest = [];
let calYear, calMonth;
let isFixedMode = false;

function openLeave() {
  pendingLeave = [...leaveDays];
  pendingRest = [...allocatedRestDays];
  isFixedMode = settings.restMode === 'fixed';
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
  document.getElementById('leaveModal').style.display = 'flex';
}

function closeLeaveCal() {
  document.getElementById('leaveModal').style.display = 'none';
}

function changeCalMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function toggleCalendarDay(dateStr) {
  const dt = new Date(dateStr + 'T00:00:00');
  // Can't toggle weekends (except in fixed mode where every day is workable)
  if (!isFixedMode) {
    const restSet = getRestDaySet();
    if (restSet.has(dt.getDay())) return;
  }
  // In fixed mode: cycle work -> rest -> leave -> work
  if (isFixedMode) {
    if (pendingRest.includes(dateStr)) {
      pendingRest = pendingRest.filter(d => d !== dateStr);
      if (!pendingLeave.includes(dateStr)) pendingLeave.push(dateStr);
    } else if (pendingLeave.includes(dateStr)) {
      pendingLeave = pendingLeave.filter(d => d !== dateStr);
    } else {
      pendingRest.push(dateStr);
    }
  } else {
    const idx = pendingLeave.indexOf(dateStr);
    if (idx >= 0) pendingLeave.splice(idx, 1);
    else pendingLeave.push(dateStr);
  }
  renderCalendar();
}

function saveLeaveCal() {
  leaveDays = [...pendingLeave];
  allocatedRestDays = [...pendingRest];
  saveLeaveDays(leaveDays);
  saveRestDays(allocatedRestDays);
  displayValue = calcToday().earned;
  closeLeaveCal();
  const now = new Date();
  const lCount = leaveDays.filter(d => {
    const dt = new Date(d);
    return dt.getFullYear() === now.getFullYear() && dt.getMonth() === now.getMonth();
  }).length;
  const rCount = isFixedMode ? pendingRest.filter(d => {
    const dt = new Date(d);
    return dt.getFullYear() === now.getFullYear() && dt.getMonth() === now.getMonth();
  }).length : 0;
  const parts = [];
  if (rCount > 0) parts.push(`${rCount} 天休息`);
  if (lCount > 0) parts.push(`${lCount} 天请假`);
  showToast(parts.length > 0 ? `已保存：${parts.join('，')}` : '本月无请假/休息');
}

const CAL_HEADERS = ['一','二','三','四','五','六','日'];

function renderCalendar() {
  const label = isFixedMode ? '（点击切换：上班→休息→请假）' : '（点击工作日切换请假）';
  document.getElementById('calMonthLabel').textContent = (calMonth + 1) + '月 ' + calYear;

  const today = todayStr();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const daysInMonth = lastDay.getDate();
  let startDow = firstDay.getDay() - 1;
  if (startDow < 0) startDow = 6;

  const restSet = getRestDaySet();

  let html = '';
  CAL_HEADERS.forEach((h, i) => {
    const isWe = !isFixedMode && (i >= 5 || (settings.restMode === 'single' && i === 6));
    html += `<div class="calendar-header-cell${isWe ? ' weekend' : ''}">${h}</div>`;
  });

  for (let i = 0; i < startDow; i++) {
    html += '<div class="calendar-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const dt = new Date(calYear, calMonth, d);
    const wd = dt.getDay();
    const isWe = !isFixedMode && restSet.has(wd);
    const isLeave = pendingLeave.includes(ds);
    const isRest = pendingRest.includes(ds);
    const isToday = ds === today;

    let cls = 'calendar-day';
    if (isWe) cls += ' weekend';
    else if (isRest) cls += ' rest';
    else if (isLeave) cls += ' leave';
    else cls += ' workday';
    if (isToday) cls += ' today';

    html += `<div class="${cls}" onclick="toggleCalendarDay('${ds}')">${d}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  // Update legend for fixed mode
  document.querySelector('#leaveModal .calendar-legend').innerHTML = isFixedMode ?
    `<span><span class="legend-dot work"></span>上班</span>` +
    `<span><span class="legend-dot rest"></span>休息</span>` +
    `<span><span class="legend-dot leave"></span>请假</span>` :
    `<span><span class="legend-dot work"></span>上班</span>` +
    `<span><span class="legend-dot leave"></span>请假</span>` +
    `<span><span class="legend-dot rest"></span>休息</span>`;
}
